  <style>

      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      background: linear-gradient(135deg, #0b1220, #1f3c88);
    }

    .container {
      margin-top: 100px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;

    p {
      font-size: 20px;
      color: #cbd5e1;

      padding: 14px 28px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #2979f2;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1f5fd1;

    footer {
      margin-top: 80px;
      font-size: 14px;
      color: #94a3b8;
    }
